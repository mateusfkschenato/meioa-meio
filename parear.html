<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Meio a Meio</title>

    <!-- VIEWPORT para celulares -->
    <meta name="viewport" content="width=480, initial-scale=1.0" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Logo -->
    <img class="logo" src="https://i.imgur.com/QLwmTAn.png" alt="Logo" />

    <!-- Título -->
    <h1>Divida seu prensado! #BoraDividir</h1>

    <!-- Formulário -->
    <input id="nome" placeholder="Seu nome" />
    <input id="turma" placeholder="Sua turma" type="number" min="1" />

    <button id="entrarBtn">Entrar na fila</button>

    <!-- Mensagens de status -->
    <div id="aguardandoStatus"></div>
    <div
      id="pareadoStatus"
      style="display: none; font-size: 1.2rem; margin-top: 1rem; transition: opacity 0.5s ease;"
    ></div>

    <!-- Chat -->
    <div id="chatArea" style="display: none; margin-top: 20px;">
      <div id="parceiroInfo" style="display: flex; align-items: center; gap: 10px;">
        <div id="parceiroNomeTurma"></div>
      </div>

      <h2 id="chatTitulo">Converse com seu parceiro</h2>

      <div id="mensagens" class="mensagens">
        <div class="mensagens-placeholder">
          Aqui, vocês podem conversar sobre que horas irão dividir, onde será o ponto de encontro, como irão pagar...
        </div>
      </div>

      <input
        id="msgInput"
        placeholder="Digite sua mensagem"
        onkeyup="if(event.key === 'Enter') enviarMensagem();"
      />
      <button onclick="enviarMensagem()">Enviar</button>
      <button onclick="sairDoChat()">Sair do chat</button>
    </div>

    <!-- JS -->
    <script src="main.js"></script>
  </body>
</html>
